name: zealous-swap CI

permissions: {}

on:
  push:
    paths:
      - "zealous-swap/**"
      - ".github/workflows/zealous-swap.yml"
  pull_request:
    paths:
      - "zealous-swap/**"
      - ".github/workflows/zealous-swap.yml"
  workflow_dispatch:

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: zealous-swap
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build --sizes

      - name: Run Forge tests
        run: forge test -vvv
